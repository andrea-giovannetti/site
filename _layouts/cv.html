---
layout: default
---
<!-- _layouts/cv.html -->
<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}{% if page.cv_pdf %} <a href="{{ page.cv_pdf | prepend: 'assets/pdf/' | relative_url }}" target="_blank" rel="noopener noreferrer" class="float-right" title="Download CV (PDF)"><i class="fa-solid fa-file-pdf"></i></a>{% endif %}</h1>
    {% if page.description %}<p class="post-description">{{ page.description }}</p>{% endif %}
  </header>

  <article>
    {{ content }}

    {% if page.cv_pdf %}
    <div class="cv-pdf" style="width: 100%; height: 800px;">
      <iframe src="{{ page.cv_pdf | prepend: 'assets/pdf/' | relative_url }}" width="100%" height="800px" style="border: none;">
        This browser does not support embedded PDFs. Please
        <a href="{{ page.cv_pdf | prepend: 'assets/pdf/' | relative_url }}">download the CV (PDF)</a>
        instead.
      </iframe>
    </div>
    {% endif %}
  </article>

</div>
